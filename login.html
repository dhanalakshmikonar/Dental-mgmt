<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Dental Clinic Login</title>

    <style>

        body{
            font-family:Arial,sans-serif;
            background:#0077b6;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            margin:0;
        }

        .login-box{

            background:white;
            padding:30px;
            border-radius:10px;
            width:350px;
            box-shadow:0 0 10px rgba(0,0,0,0.3);

        }

        h2{

            text-align:center;
            margin-bottom:20px;

        }

        input{

            width:100%;
            padding:10px;
            margin-top:10px;
            margin-bottom:15px;
            border:1px solid #ccc;
            border-radius:5px;

        }

        button{

            width:100%;
            padding:10px;
            background:#0077b6;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;

        }

        button:hover{

            background:#005f8d;

        }

    </style>

</head>

<body>

<div class="login-box">

<h2>🦷 Dental Clinic Login</h2>

<input
type="text"
id="username"
placeholder="Enter Username">

<input
type="password"
id="password"
placeholder="Enter Password">

<button onclick="login()">

Login

</button>

</div>

<script>

async function login(){

    const data={

        username:document.getElementById("username").value,
        password:document.getElementById("password").value

    };

    const response=await fetch("/login",{

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify(data)

    });

    const result=await response.json();

    if(result.success){

        window.location.href="indexes.html";

    }

    else{

        alert("Invalid Username or Password");

    }

}

</script>

</body>
</html>
