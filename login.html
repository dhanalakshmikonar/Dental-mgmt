<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dental Clinic - Login</title>
    <!-- Font Awesome for modern icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Link to the unified style.css -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">

<div class="login-container">
    <div class="login-header">
        <i class="fa-solid fa-tooth"></i>
        <h1>JAAW Pediatric Dental Clinic</h1>
        <p>Sign in to access your dashboard</p>
    </div>

    <div class="form-group">
        <label for="username">Username</label>
        <div style="position: relative;">
            <input type="text" id="username" placeholder="Enter your username" style="padding-left: 40px;">
            <i class="fa-solid fa-user" style="position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-muted);"></i>
        </div>
    </div>

    <div class="form-group">
        <label for="password">Password</label>
        <div style="position: relative;">
            <input type="password" id="password" placeholder="Enter your password" style="padding-left: 40px;">
            <i class="fa-solid fa-lock" style="position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-muted);"></i>
        </div>
    </div>

    <button onclick="login()" class="btn btn-primary" style="margin-top: 10px;">
        <i class="fa-solid fa-right-to-bracket"></i> Login
    </button>
</div>

<script>
async function login() {
    const usernameInput = document.getElementById("username");
    const passwordInput = document.getElementById("password");

    const data = {
        username: usernameInput.value.trim(),
        password: passwordInput.value
    };

    if (!data.username || !data.password) {
        alert("Please fill in both fields");
        return;
    }

    try {
        const response = await fetch("/login", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        });

        const result = await response.json();

        if (result.success) {
            window.location.href = "indexes.html";
        } else {
            alert("Invalid Username or Password");
        }
    } catch (error) {
        console.error(error);
        alert("Server error. Please try again later.");
    }
}

// Allow login on pressing Enter key
document.addEventListener("keypress", function(event) {
    if (event.key === "Enter") {
        login();
    }
});
</script>

</body>
</html>
