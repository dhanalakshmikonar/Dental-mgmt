<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Medicine Stock Management</title>

<style>

body{
font-family:Segoe UI,sans-serif;
background:#f4f8fc;
padding:20px;
}

header{
background:#0077b6;
color:white;
padding:20px;
text-align:center;
border-radius:10px;
}

.container{
display:flex;
gap:20px;
margin-top:20px;
}

.form-section,
.details-section{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.form-section{
width:40%;
}

.details-section{
width:60%;
}

input,textarea{
width:100%;
padding:10px;
margin-top:8px;
margin-bottom:12px;
border:1px solid #ccc;
border-radius:6px;
}

button{
width:100%;
padding:12px;
background:#0077b6;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#023e8a;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

table,th,td{
border:1px solid #ccc;
}

th{
background:#0077b6;
color:white;
}

th,td{
padding:10px;
text-align:center;
}

.medicine-row{
cursor:pointer;
}

.medicine-row:hover{
background:#eaf4ff;
}

.info{
margin-top:10px;
}

.back-btn{
display:inline-block;
margin-bottom:15px;
padding:10px 15px;
background:#28a745;
color:white;
text-decoration:none;
border-radius:6px;
}

</style>
</head>

<body>

<header>
<h1>💊 Medicine Stock Management</h1>
</header>

<br>

<a href="indexes.html" class="back-btn">
⬅ Back to Home
</a>

<div class="container">

<!-- LEFT SIDE -->

<div class="form-section">

<h2>Weekly Stock Update</h2>

<input type="text" id="medicineName" placeholder="Medicine Name">

<input type="number" id="stockQty" placeholder="Stock Quantity">

<label>Last Updated Date</label>
<input type="date" id="updateDate">

<label>Expiry Date</label>
<input type="date" id="expiryDate">

<textarea id="notes" placeholder="Notes"></textarea>

<button onclick="addMedicine()">
Update Stock
</button>

</div>

<!-- RIGHT SIDE -->

<div class="details-section">

<h2>Medicine Stock Table</h2>

<table>

<thead>
<tr>
<th>Medicine Name</th>
<th>Stock</th>
<th>Updated</th>
<th>Expiry</th>
</tr>
</thead>

<tbody id="medicineTable">


</tbody>

</table>

<hr><br>

<h2>Medicine Details</h2>

<div class="info">
<b>Medicine Name:</b>
<span id="mname">Select Medicine</span>
</div>

<div class="info">
<b>Stock Quantity:</b>
<span id="mstock">-</span>
</div>

<div class="info">
<b>Last Updated:</b>
<span id="mupdate">-</span>
</div>

<div class="info">
<b>Expiry Date:</b>
<span id="mexpiry">-</span>
</div>

<div class="info">
<b>Notes:</b>
<span id="mnotes">-</span>
</div>

</div>

</div>

<script>

function showMedicine(
name,
stock,
updated,
expiry,
notes
){

document.getElementById("mname").innerText=name;
document.getElementById("mstock").innerText=stock;
document.getElementById("mupdate").innerText=updated;
document.getElementById("mexpiry").innerText=expiry;
document.getElementById("mnotes").innerText=notes;

}

async function addMedicine(){

    const medicineData = {

        medicineName: document.getElementById("medicineName").value,
        stock: document.getElementById("stockQty").value,
        updated: document.getElementById("updateDate").value,
        expiry: document.getElementById("expiryDate").value,
        notes: document.getElementById("notes").value

    };
    console.log(medicineData);
    const response = await fetch("/add-medicine", {

        method: "POST",

        headers:{
            "Content-Type":"application/json"
        },

        body: JSON.stringify(medicineData)

    });

    const result = await response.json();

    alert(result.message);

    document.getElementById("medicineName").value="";
    document.getElementById("stockQty").value="";
    document.getElementById("updateDate").value="";
    document.getElementById("expiryDate").value="";
    document.getElementById("notes").value="";

    loadMedicines();

}
async function loadMedicines(){

    const response = await fetch("/medicines");

    const medicines = await response.json();

    const table = document.getElementById("medicineTable");

    table.innerHTML = "";

    medicines.forEach(function(medicine){

        const row = document.createElement("tr");

        row.className = "medicine-row";

        row.innerHTML = `

            <td>${medicine.medicineName}</td>
            <td>${medicine.stock}</td>
            <td>${medicine.updated}</td>
            <td>${medicine.expiry}</td>

        `;

        row.onclick = function(){

            showMedicine(

                medicine.medicineName,
                medicine.stock,
                medicine.updated,
                medicine.expiry,
                medicine.notes

            );

        };

        table.appendChild(row);

    });

}

loadMedicines();

</script>

</body>
</html>
